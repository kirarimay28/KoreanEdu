<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d6f6b"/>
      <stop offset="55%" stop-color="#1f4c49"/>
      <stop offset="100%" stop-color="#163836"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Top-left highlight sheen -->
  <ellipse cx="8" cy="5" rx="11" ry="7" fill="rgba(255,255,255,0.11)"/>
  <!-- Inner medallion border -->
  <rect x="1.5" y="1.5" width="29" height="29" rx="5.8"
        fill="none" stroke="rgba(255,255,255,0.16)" stroke-width="0.8"/>

  <!-- Crane body -->
  <ellipse cx="14" cy="22.5" rx="5.8" ry="2.3"
           transform="rotate(-10 14 22.5)" fill="rgba(255,255,255,0.92)"/>

  <!-- Upper wing sweep -->
  <path d="M8 20.5 C10.5 12.5 15.5 11 18 17.5" fill="rgba(255,255,255,0.75)"/>

  <!-- Neck -->
  <path d="M18 17.5 C19 14 20 11 20.5 8.5"
        stroke="rgba(255,255,255,0.92)" stroke-width="2.2"
        stroke-linecap="round" fill="none"/>

  <!-- Head -->
  <circle cx="21" cy="7.5" r="2.2" fill="rgba(255,255,255,0.92)"/>

  <!-- Red crown (단정학 붉은 정수리) -->
  <ellipse cx="21.5" cy="5.5" rx="1.4" ry="0.85" fill="#c0392b" opacity="0.92"/>

  <!-- Beak -->
  <path d="M22.8 7 L27 5.8"
        stroke="rgba(255,255,255,0.88)" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Tail feathers -->
  <path d="M8 21.5 C5.5 23 3.5 25 1.5 27.5"
        stroke="rgba(255,255,255,0.82)" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M9 23.5 C7 25 5.5 26.5 4 28.5"
        stroke="rgba(255,255,255,0.52)" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Legs -->
  <path d="M13 24.5 L12 30 M16 25 L15.5 30.5"
        stroke="rgba(255,255,255,0.80)" stroke-width="1.3" stroke-linecap="round"/>
</svg>
