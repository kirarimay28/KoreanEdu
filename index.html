<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1f4c49" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="나랏말" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>나랏말</title>
    <script>
(function(){
  var m = document.querySelector('meta[name="app-build"]');
  if (!m) return;
  var cur = m.getAttribute('content');
  if (!cur) return;
  fetch('/version.txt?t=' + Date.now(), { cache: 'no-store' })
    .then(function(r) { return r.text(); })
    .then(function(v) {
      if (v.trim() && v.trim() !== cur) {
        location.replace('/?_v=' + Date.now());
      }
    })
    .catch(function() {});
})();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
